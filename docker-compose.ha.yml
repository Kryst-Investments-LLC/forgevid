version: '3.8'

services:
  # Load Balancer
  nginx:
    image: nginx:alpine
    container_name: forgevid-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app1
      - app2
      - app3
    restart: unless-stopped
    networks:
      - forgevid-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Application Instances (3 for HA)
  app1:
    build: .
    container_name: forgevid-app1
    environment:
      - NODE_ENV=production
      - PORT=3000
      - INSTANCE_ID=app1
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - forgevid-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  app2:
    build: .
    container_name: forgevid-app2
    environment:
      - NODE_ENV=production
      - PORT=3000
      - INSTANCE_ID=app2
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - forgevid-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  app3:
    build: .
    container_name: forgevid-app3
    environment:
      - NODE_ENV=production
      - PORT=3000
      - INSTANCE_ID=app3
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - forgevid-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Database (Primary)
  postgres:
    image: postgres:15-alpine
    container_name: forgevid-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-forgevid}
      - POSTGRES_USER=${POSTGRES_USER:-forgevid}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - forgevid-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forgevid} -d ${POSTGRES_DB:-forgevid}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Database (Read Replica)
  postgres-replica:
    image: postgres:15-alpine
    container_name: forgevid-postgres-replica
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-forgevid}
      - POSTGRES_USER=${POSTGRES_USER:-forgevid}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGUSER=${POSTGRES_USER:-forgevid}
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    networks:
      - forgevid-network
    command: |
      bash -c "
        until pg_basebackup -h postgres -D /var/lib/postgresql/data -U ${POSTGRES_USER:-forgevid} -v -P -W; do
          echo 'Waiting for primary to connect...'
          sleep 1s
        done
        echo 'Backup done, starting replica...'
        postgres
      "
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forgevid} -d ${POSTGRES_DB:-forgevid}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis (Primary)
  redis:
    image: redis:7-alpine
    container_name: forgevid-redis
    command: redis-server --appendonly yes --replica-read-only no
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - forgevid-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis (Replica)
  redis-replica:
    image: redis:7-alpine
    container_name: forgevid-redis-replica
    command: redis-server --appendonly yes --replicaof redis 6379
    volumes:
      - redis_replica_data:/data
    ports:
      - "6380:6379"
    restart: unless-stopped
    networks:
      - forgevid-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: forgevid-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - forgevid-network

  grafana:
    image: grafana/grafana:latest
    container_name: forgevid-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    restart: unless-stopped
    networks:
      - forgevid-network
    depends_on:
      - prometheus

  # Log aggregation
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    container_name: forgevid-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    restart: unless-stopped
    networks:
      - forgevid-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.8.0
    container_name: forgevid-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    restart: unless-stopped
    networks:
      - forgevid-network
    depends_on:
      - elasticsearch

  # File storage
  minio:
    image: minio/minio:latest
    container_name: forgevid-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-forgevid}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-forgevid123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    networks:
      - forgevid-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Backup service
  backup:
    image: postgres:15-alpine
    container_name: forgevid-backup
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    command: |
      sh -c "
        apk add --no-cache postgresql-client &&
        chmod +x /backup.sh &&
        crond -f -l 2
      "
    restart: unless-stopped
    networks:
      - forgevid-network
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  postgres_replica_data:
    driver: local
  redis_data:
    driver: local
  redis_replica_data:
    driver: local
  nginx_cache:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local
  minio_data:
    driver: local

networks:
  forgevid-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16


