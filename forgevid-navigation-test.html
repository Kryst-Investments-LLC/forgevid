<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeVid Navigation Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white">
    <!-- Navigation -->
    <nav class="border-b border-gray-800 px-6 py-4">
        <div class="container mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-8">
                <h1 class="text-2xl font-bold text-purple-400">ForgeVid Test</h1>
                <div class="flex items-center space-x-6">
                    <button class="text-gray-300 hover:text-white transition-colors" data-nav="home">
                        <i class="fas fa-home mr-2"></i>Home
                    </button>
                    <button class="text-gray-300 hover:text-white transition-colors" data-nav="explore">
                        <i class="fas fa-search mr-2"></i>Explore
                    </button>
                    <button class="text-gray-300 hover:text-white transition-colors" data-nav="features">
                        <i class="fas fa-star mr-2"></i>Features
                    </button>
                    <button class="text-gray-300 hover:text-white transition-colors" data-nav="grid">
                        <i class="fas fa-th mr-2"></i>Grid
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Home Section -->
    <section class="py-16 px-6 bg-purple-900" data-section="home">
        <div class="container mx-auto text-center">
            <h1 class="text-5xl font-bold mb-6">🏠 HOME SECTION</h1>
            <p class="text-xl mb-8">This is the home section - visible by default</p>
        </div>
    </section>

    <!-- Explore Section -->
    <section class="py-16 px-6 bg-blue-900 hidden" data-section="explore">
        <div class="container mx-auto text-center">
            <h1 class="text-5xl font-bold mb-6">🔍 EXPLORE SECTION</h1>
            <p class="text-xl mb-8">This is the explore section</p>
        </div>
    </section>

    <!-- Features Section -->
    <section class="py-16 px-6 bg-green-900 hidden" data-section="features">
        <div class="container mx-auto text-center">
            <h1 class="text-5xl font-bold mb-6">⭐ FEATURES SECTION</h1>
            <p class="text-xl mb-8">This is the features section</p>
        </div>
    </section>

    <!-- Grid Section -->
    <section class="py-16 px-6 bg-red-900 hidden" data-section="grid">
        <div class="container mx-auto text-center">
            <h1 class="text-5xl font-bold mb-6">🔲 GRID SECTION</h1>
            <p class="text-xl mb-8">This is the grid section</p>
        </div>
    </section>

    <script>
        console.log("[NAV TEST] Starting navigation test...");

        function handleNavigation(section) {
            console.log(`[NAV TEST] Navigating to: ${section}`);
            
            // Hide all sections
            const sections = document.querySelectorAll('[data-section]');
            console.log(`[NAV TEST] Found ${sections.length} sections`);
            sections.forEach(sec => {
                sec.classList.add('hidden');
                console.log(`[NAV TEST] Hidden: ${sec.getAttribute('data-section')}`);
            });
            
            // Show specific section
            const targetSection = document.querySelector(`[data-section="${section}"]`);
            if (!targetSection) {
                console.error(`[NAV TEST] Section not found: ${section}`);
                return;
            }
            
            targetSection.classList.remove('hidden');
            console.log(`[NAV TEST] Showing: ${section}`);
            
            // Scroll to section
            targetSection.scrollIntoView({ behavior: 'smooth' });
        }

        // Initialize navigation
        function initNavigation() {
            console.log("[NAV TEST] Initializing navigation...");
            
            const navButtons = document.querySelectorAll('[data-nav]');
            console.log(`[NAV TEST] Found ${navButtons.length} nav buttons`);
            
            navButtons.forEach((btn, index) => {
                const navTarget = btn.getAttribute('data-nav');
                console.log(`[NAV TEST] Button ${index}: ${navTarget}`);
                
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    console.log(`[NAV TEST] Clicked: ${navTarget}`);
                    handleNavigation(navTarget);
                });
            });
            
            console.log("[NAV TEST] Navigation initialized!");
        }

        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initNavigation);
        } else {
            initNavigation();
        }
    </script>
</body>
</html>
