<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeVid - Bulletproof Version</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .title {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #8B5CF6, #EC4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 30px;
        }
        
        .status {
            background: #2a2a2a;
            border: 2px solid #4a4a4a;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .video-card {
            background: #2a2a2a !important;
            border: 2px solid #4a4a4a !important;
            border-radius: 15px !important;
            overflow: hidden !important;
            transition: all 0.3s ease !important;
            cursor: pointer !important;
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            min-height: 350px !important;
        }
        
        .video-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: #8B5CF6;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
        }
        
        .video-thumbnail {
            height: 200px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            position: relative !important;
            font-size: 3rem !important;
            color: white !important;
        }
        
        .video-info {
            padding: 20px !important;
        }
        
        .video-title {
            font-size: 1.3rem !important;
            font-weight: bold !important;
            margin-bottom: 10px !important;
            color: white !important;
        }
        
        .video-desc {
            color: #ccc !important;
            margin-bottom: 15px !important;
            line-height: 1.4 !important;
        }
        
        .video-stats {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            color: #aaa !important;
            font-size: 0.9rem !important;
        }
        
        .btn {
            background: linear-gradient(135deg, #8B5CF6, #EC4899);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.4);
        }
        
        .search-container {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .search-input {
            background: #2a2a2a;
            border: 2px solid #4a4a4a;
            border-radius: 10px;
            padding: 15px;
            color: white;
            font-size: 1rem;
            width: 100%;
            max-width: 500px;
        }
        
        .search-input:focus {
            border-color: #8B5CF6;
            outline: none;
        }
        
        .filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .debug-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 15px;
            color: #00ff00;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            max-width: 250px;
        }
        
        /* Force visibility with highest specificity */
        #video-grid .video-card,
        .grid .video-card {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            position: relative !important;
            width: 100% !important;
        }
    </style>
</head>
<body>
    <div class="debug-panel" id="debug-panel">
        <div>🔧 Bulletproof Debug</div>
        <div id="debug-status">Initializing...</div>
        <div id="debug-count">Videos: 0</div>
        <div id="debug-render">Render: No</div>
        <button onclick="forceRender()" style="background: #ff0000; color: white; border: none; padding: 5px 10px; border-radius: 5px; margin-top: 10px; cursor: pointer;">
            FORCE RENDER
        </button>
    </div>

    <div class="container">
        <div class="header">
            <h1 class="title">ForgeVid</h1>
            <p class="subtitle">AI-Powered Video Generation Platform</p>
        </div>

        <div class="status" id="status">
            <div id="status-text">Loading video gallery...</div>
        </div>

        <div class="search-container">
            <input type="text" class="search-input" placeholder="Search videos..." id="search-input">
        </div>

        <div class="filters" id="filters">
            <button class="btn" onclick="filterVideos('all')">All Videos</button>
            <button class="btn" onclick="filterVideos('cinematic')">Cinematic</button>
            <button class="btn" onclick="filterVideos('3d')">3D</button>
            <button class="btn" onclick="filterVideos('abstract')">Abstract</button>
        </div>

        <div class="grid" id="video-grid">
            <!-- Videos will be inserted here -->
        </div>

        <div style="text-align: center;">
            <button class="btn" onclick="addMoreVideos()">Load More Videos</button>
        </div>
    </div>

    <script>
        // Simple video data
        const videos = [
            {
                id: 1,
                title: "Cyberpunk City Night",
                description: "Futuristic cityscape with neon lights and flying cars",
                category: "cinematic",
                duration: "2:15",
                likes: 1200,
                views: 12500,
                color: "linear-gradient(135deg, #8B5CF6, #EC4899)"
            },
            {
                id: 2,
                title: "Ocean Wave Cinematic",
                description: "Dramatic ocean waves in slow motion",
                category: "cinematic",
                duration: "1:30",
                likes: 856,
                views: 8900,
                color: "linear-gradient(135deg, #0EA5E9, #06B6D4)"
            },
            {
                id: 3,
                title: "Abstract Geometry",
                description: "Morphing geometric shapes with vibrant colors",
                category: "abstract",
                duration: "0:45",
                likes: 2100,
                views: 15300,
                color: "linear-gradient(135deg, #10B981, #F59E0B)"
            },
            {
                id: 4,
                title: "Space Journey",
                description: "Travel through galaxies and nebulas",
                category: "cinematic",
                duration: "3:20",
                likes: 3400,
                views: 22700,
                color: "linear-gradient(135deg, #EF4444, #F97316)"
            },
            {
                id: 5,
                title: "AI Portrait",
                description: "Dynamic AI-generated character animation",
                category: "3d",
                duration: "1:45",
                likes: 1800,
                views: 11200,
                color: "linear-gradient(135deg, #6366F1, #8B5CF6)"
            },
            {
                id: 6,
                title: "Product Showcase",
                description: "Professional product demonstration video",
                category: "3d",
                duration: "2:30",
                likes: 967,
                views: 7400,
                color: "linear-gradient(135deg, #EC4899, #EF4444)"
            }
        ];

        let allVideos = [...videos];
        let currentFilter = 'all';

        function updateDebug(status, count, render) {
            document.getElementById('debug-status').textContent = status;
            document.getElementById('debug-count').textContent = `Videos: ${count}`;
            document.getElementById('debug-render').textContent = `Render: ${render}`;
            console.log(`[DEBUG] ${status} | Videos: ${count} | Render: ${render}`);
        }

        function updateStatus(message) {
            document.getElementById('status-text').textContent = message;
            console.log(`[STATUS] ${message}`);
        }

        function createVideoCard(video) {
            updateDebug(`Creating ${video.title}`, allVideos.length, 'In Progress');
            
            const card = document.createElement('div');
            card.className = 'video-card';
            card.style.display = 'block';
            card.style.visibility = 'visible';
            card.style.opacity = '1';
            
            card.innerHTML = `
                <div class="video-thumbnail" style="background: ${video.color};">
                    <div>▶</div>
                    <div style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 5px; font-size: 0.8rem;">
                        ${video.duration}
                    </div>
                </div>
                <div class="video-info">
                    <div class="video-title">${video.title}</div>
                    <div class="video-desc">${video.description}</div>
                    <div class="video-stats">
                        <span>❤️ ${video.likes}</span>
                        <span>👁️ ${video.views}</span>
                    </div>
                </div>
            `;
            
            card.addEventListener('click', () => playVideo(video));
            
            return card;
        }

        function renderVideos(videosToRender = allVideos) {
            updateStatus('Rendering videos...');
            updateDebug('Starting render', videosToRender.length, 'Starting');
            
            const grid = document.getElementById('video-grid');
            if (!grid) {
                updateDebug('ERROR: Grid not found!', 0, 'Failed');
                return;
            }

            // Clear existing content
            grid.innerHTML = '';
            
            // Add each video
            videosToRender.forEach((video, index) => {
                const card = createVideoCard(video);
                grid.appendChild(card);
                updateDebug(`Added ${video.title}`, index + 1, 'Adding');
            });

            // Force visibility
            const cards = grid.querySelectorAll('.video-card');
            cards.forEach((card, index) => {
                card.style.display = 'block';
                card.style.visibility = 'visible';
                card.style.opacity = '1';
                card.style.position = 'relative';
                card.style.width = '100%';
                card.style.minHeight = '350px';
            });

            updateStatus(`✅ ${videosToRender.length} videos loaded successfully!`);
            updateDebug('Render complete', videosToRender.length, 'Success');
        }

        function forceRender() {
            updateDebug('FORCE RENDER TRIGGERED', allVideos.length, 'Force');
            renderVideos();
            
            // Extra force - make everything highly visible
            setTimeout(() => {
                const grid = document.getElementById('video-grid');
                const cards = grid.querySelectorAll('.video-card');
                
                cards.forEach((card, index) => {
                    card.style.backgroundColor = '#ff0000';
                    card.style.border = '5px solid #00ff00';
                    card.style.color = '#ffffff';
                    card.style.display = 'block';
                    card.style.visibility = 'visible';
                    card.style.opacity = '1';
                    card.style.position = 'relative';
                    card.style.width = '100%';
                    card.style.minHeight = '400px';
                    card.style.margin = '10px';
                    card.style.padding = '20px';
                });
                
                updateDebug('FORCE VISIBILITY APPLIED', cards.length, 'Forced');
                updateStatus(`🚨 FORCED ${cards.length} cards to be visible!`);
            }, 500);
        }

        function filterVideos(category) {
            currentFilter = category;
            const filtered = category === 'all' ? videos : videos.filter(v => v.category === category);
            renderVideos(filtered);
            updateStatus(`Showing ${filtered.length} ${category} videos`);
        }

        function playVideo(video) {
            alert(`Playing: ${video.title}\n\nThis is a demo - in a real app, this would open a video player.`);
        }

        function addMoreVideos() {
            const newVideos = [
                {
                    id: 7,
                    title: "Nature Documentary",
                    description: "Wildlife in natural habitat",
                    category: "cinematic",
                    duration: "4:15",
                    likes: 2500,
                    views: 18600,
                    color: "linear-gradient(135deg, #059669, #0D9488)"
                },
                {
                    id: 8,
                    title: "Tech Demo",
                    description: "Modern technology showcase",
                    category: "3d",
                    duration: "2:45",
                    likes: 1150,
                    views: 9200,
                    color: "linear-gradient(135deg, #374151, #6B7280)"
                }
            ];
            
            allVideos.push(...newVideos);
            renderVideos();
            updateStatus(`Added ${newVideos.length} more videos!`);
        }

        // Search functionality
        document.getElementById('search-input').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allVideos.filter(video => 
                video.title.toLowerCase().includes(searchTerm) || 
                video.description.toLowerCase().includes(searchTerm)
            );
            renderVideos(filtered);
            updateStatus(`Found ${filtered.length} videos matching "${searchTerm}"`);
        });

        // Initialize immediately
        updateDebug('Page loaded', videos.length, 'Init');
        updateStatus('Initializing ForgeVid...');

        // Multiple render attempts
        setTimeout(() => {
            updateDebug('First render attempt', videos.length, 'Attempt 1');
            renderVideos();
        }, 100);

        setTimeout(() => {
            updateDebug('Second render attempt', videos.length, 'Attempt 2');
            renderVideos();
        }, 500);

        setTimeout(() => {
            updateDebug('Third render attempt', videos.length, 'Attempt 3');
            renderVideos();
        }, 1000);

        // Emergency fallback
        setTimeout(() => {
            const grid = document.getElementById('video-grid');
            if (!grid || grid.children.length === 0) {
                updateDebug('EMERGENCY FALLBACK', videos.length, 'Emergency');
                forceRender();
            }
        }, 2000);

        console.log('🚀 Bulletproof ForgeVid initialized!');
        console.log('Videos data:', videos);
    </script>
</body>
</html>
