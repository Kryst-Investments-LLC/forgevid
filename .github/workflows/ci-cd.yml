name: CI/CD Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Runs at 00:00 on the first day of January, April, July, October (quarterly)
    - cron: '0 0 1 1,4,7,10 *'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: pnpm install
      - name: Lint
        run: pnpm lint || true
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  remind-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Create quarterly review reminder issue
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: 'Quarterly Compliance & Recovery Documentation Review Reminder'
          content-filepath: .github/review-reminder.md
          labels: 'compliance, documentation, reminder'
